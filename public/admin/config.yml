# Conecta Sveltia CMS directamente con el repositorio de GitHub.
backend:
  name: github
  repo: Axudi-asociacion/Axudi-web
  branch: main

# Permite probar el CMS en local con servidor compatible.
local_backend: true

# Carpeta donde el CMS guarda las imágenes subidas.
media_folder: public/uploads/news
public_folder: /uploads/news

# Limpia los nombres de archivo generados desde el título.
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

# Colecciones editables desde el panel /admin.
collections:
  - name: noticias
    label: Noticias
    label_singular: Noticia
    folder: src/content/news
    create: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: noticias-y-eventos
    fields:
      - label: Título
        name: title
        widget: string
      - label: Fecha
        name: date
        widget: datetime
        format: YYYY-MM-DD
        date_format: DD/MM/YYYY
        time_format: false
      - label: Categoría
        name: category
        widget: select
        options:
          - Asociación
          - Evento
          - Talleres
      - label: Imagen destacada
        name: image
        widget: image
      - label: Texto alternativo de la imagen
        name: alt
        widget: string
      - label: Resumen
        name: excerpt
        widget: text
      - label: Borrador
        name: draft
        widget: boolean
        default: false
        required: false
      - label: Contenido
        name: body
        widget: markdown
